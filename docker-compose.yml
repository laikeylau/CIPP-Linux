# CIPP Linux Deployment - Docker Compose
# ==========================================
# Azurite + Nginx (API runs natively on host via cipp-server.ps1)
# ==========================================

services:
  # ==========================================
  # Azure Storage Emulator (Azurite)
  # ==========================================
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: cipp-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNoBnZf6KgBVU4=
    volumes:
      - azurite-data:/data
    networks:
      - cipp-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10000, 'localhost').on('connect', () => { process.exit(0) }).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Nginx (前端静态文件 + API 反向代理)
  # ==========================================
  # /api/* → host.docker.internal:7071 (native pwsh API)
  # /*     → 静态前端文件
  nginx:
    image: nginx:alpine
    container_name: cipp-nginx
    restart: unless-stopped
    ports:
      - "29810:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - cipp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cipp-network:
    driver: bridge

volumes:
  azurite-data:

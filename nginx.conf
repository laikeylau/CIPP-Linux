worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ==========================================
    # Gzip Compression (关键优化)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        font/opentype
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;

    # ==========================================
    # Rate Limiting
    # ==========================================
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_register:10m rate=2r/s;
    limit_req_status 429;

    # ==========================================
    # Upstream: CIPP API
    # ==========================================
    upstream cipp_api {
        server host.docker.internal:7071;
        keepalive 32;
    }

    # ==========================================
    # Proxy Cache (API 响应缓存)
    # ==========================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ==========================================
        # Security Headers
        # ==========================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ==========================================
        # 静态资源缓存 (Next.js _next 路径)
        # ==========================================
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ==========================================
        # 其他静态资源
        # ==========================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ==========================================
        # Login endpoint (strict rate limiting)
        # ==========================================
        location = /api/Invoke-AuthLogin {
            limit_req zone=api_login burst=3 nodelay;
            proxy_pass http://cipp_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # ==========================================
        # Registration endpoint (strictest rate limiting)
        # ==========================================
        location = /api/Invoke-AuthRegister {
            limit_req zone=api_register burst=2 nodelay;
            proxy_pass http://cipp_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # ==========================================
        # Auth verify endpoint
        # ==========================================
        location = /api/Invoke-AuthVerify {
            limit_req zone=api_general burst=5 nodelay;
            proxy_pass http://cipp_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # ==========================================
        # API endpoints (general rate limiting)
        # ==========================================
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://cipp_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            client_max_body_size 50m;

            # API 响应缓存 (可缓存的 GET 请求)
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $request_method;
        }

        # ==========================================
        # Frontend (Next.js static export)
        # ==========================================
        location / {
            try_files $uri $uri.html $uri/index.html /index.html;

            # 首页不缓存 (SPA 入口)
            add_header Cache-Control "no-cache";
        }

        # ==========================================
        # Health check endpoint
        # ==========================================
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # Block common attack paths
        # ==========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ^/(wp-admin|wp-login|xmlrpc) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
